name: Daily Telegram Brief

permissions:
  contents: read
  actions: read

on:
  schedule:
    # Morning window around 09:36 Asia/Shanghai (01:35-02:25 UTC, every 5 minutes)
    - cron: '35-55/5 1 * * *'
    - cron: '0-25/5 2 * * *'
    # Evening window around 22:00 Asia/Shanghai (14:00-14:45 UTC, every 5 minutes)
    - cron: '0-45/5 14 * * *'
  workflow_dispatch:

concurrency:
  group: daily-telegram-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard schedule timing and dedupe sends
        id: guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          TZ_NAME: ${{ vars.TIMEZONE }}
          MORNING_BRIEF_TIME: ${{ vars.MORNING_BRIEF_TIME }}
          EVENING_BRIEF_TIME: ${{ vars.EVENING_BRIEF_TIME }}
          SCHEDULE_WINDOW_MINUTES: ${{ vars.SCHEDULE_WINDOW_MINUTES }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, time, timedelta
          from urllib.request import Request, urlopen
          from zoneinfo import ZoneInfo

          def parse_iso_utc(raw: str) -> datetime:
              return datetime.fromisoformat(raw.replace("Z", "+00:00"))

          def parse_hhmm(raw: str, default: str) -> time:
              value = (raw or default).strip()
              hour, minute = value.split(":")
              return time(int(hour), int(minute))

          def local_target(now_local: datetime, target_time: time) -> datetime:
              return now_local.replace(hour=target_time.hour, minute=target_time.minute, second=0, microsecond=0)

          event_name = os.environ.get("EVENT_NAME", "")
          run_id = int(os.environ.get("RUN_ID", "0"))
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]
          tz_name = os.environ.get("TZ_NAME", "").strip() or "Asia/Shanghai"
          morning_brief_time = parse_hhmm(os.environ.get("MORNING_BRIEF_TIME", ""), "09:36")
          evening_brief_time = parse_hhmm(os.environ.get("EVENING_BRIEF_TIME", ""), "22:00")
          window_minutes = int((os.environ.get("SCHEDULE_WINDOW_MINUTES", "") or "45").strip())
          tz = ZoneInfo(tz_name)
          now_local = datetime.now(tz)

          should_send = True
          slot = "manual"
          reason = "manual trigger"
          slot_start = None
          slot_end = None

          if event_name == "schedule":
              for candidate_slot, target_time in (
                  ("morning", morning_brief_time),
                  ("evening", evening_brief_time),
              ):
                  candidate_start = local_target(now_local, target_time)
                  candidate_end = candidate_start + timedelta(minutes=window_minutes)
                  if candidate_start <= now_local <= candidate_end:
                      slot = candidate_slot
                      slot_start = candidate_start
                      slot_end = candidate_end
                      break

              if slot in {"morning", "evening"} and slot_start is not None and slot_end is not None:
                  req = Request(
                      f"https://api.github.com/repos/{repo}/actions/workflows/daily-telegram-brief.yml/runs?event=schedule&per_page=50",
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Accept": "application/vnd.github+json",
                          "User-Agent": "daily-telegram-brief-guard",
                      },
                  )
                  with urlopen(req, timeout=20) as resp:
                      payload = json.load(resp)

                  duplicate_run = None
                  for run in payload.get("workflow_runs", []):
                      if int(run.get("id", 0)) == run_id:
                          continue
                      if run.get("status") != "completed" or run.get("conclusion") != "success":
                          continue
                      started_at = run.get("run_started_at")
                      if not started_at:
                          continue
                      started_local = parse_iso_utc(started_at).astimezone(tz)
                      if started_local.date() != now_local.date():
                          continue
                      if slot_start <= started_local <= slot_end:
                          duplicate_run = run
                          break

                  if duplicate_run is not None:
                      should_send = False
                      reason = (
                          f"already sent in {slot} slot by run "
                          f"#{duplicate_run.get('run_number')} at {duplicate_run.get('run_started_at')}"
                      )
                  else:
                      reason = (
                          f"{slot} slot window {slot_start.strftime('%H:%M')}"
                          f"-{slot_end.strftime('%H:%M')} not sent yet today"
                      )
              else:
                  should_send = False
                  reason = "outside configured send windows"

          print(f"guard: should_send={should_send} slot={slot} reason={reason}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"should_send={'true' if should_send else 'false'}\n")
              out.write(f"slot={slot}\n")
              out.write(f"reason={reason.replace(chr(10), ' ')}\n")
          PY

      - name: Checkout
        if: steps.guard.outputs.should_send == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.guard.outputs.should_send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.should_send == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        if: steps.guard.outputs.should_send == 'true'
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Skip duplicate scheduled send
        if: steps.guard.outputs.should_send != 'true'
        run: |
          echo "Skipped send: ${{ steps.guard.outputs.reason }}"

      - name: Send report to Telegram / WeChat / DingTalk
        if: steps.guard.outputs.should_send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECHAT_SENDKEY: ${{ secrets.WECHAT_SENDKEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          CITY_NAME: ${{ vars.CITY_NAME }}
          WEATHER_LATITUDE: ${{ vars.WEATHER_LATITUDE }}
          WEATHER_LONGITUDE: ${{ vars.WEATHER_LONGITUDE }}
          A_STOCK_CODES: ${{ vars.A_STOCK_CODES }}
          GOLD_HOLDING_GRAMS: ${{ vars.GOLD_HOLDING_GRAMS }}
          GOLD_TOTAL_COST_CNY: ${{ vars.GOLD_TOTAL_COST_CNY }}
          GOLD_COST_PER_GRAM_CNY: ${{ vars.GOLD_COST_PER_GRAM_CNY }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          FAIL_ON_PARTIAL_ERROR: ${{ vars.FAIL_ON_PARTIAL_ERROR }}
        run: python main.py
